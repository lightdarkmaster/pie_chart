<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings</title>
    <link rel="stylesheet" href="./css/settings.css">
</head>
<body>

    <div class="settings-container">
        <h1>Settings</h1>

        <div class="setting-section">
            <h2>Profile Settings</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" value="johndoe">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" value="john@example.com">
                </div>
            </div>
        </div>

        <div class="setting-section">
            <h2>Preferences</h2>
            <div class="form-grid" style="grid-template-columns: 1fr; margin-bottom: 16px;">
                <div class="form-group">
                    <label for="language">Language</label>
                    <select id="language">
                        <option value="en">English</option>
                        <option value="es">Español</option>
                        <option value="fr">Français</option>
                    </select>
                </div>
            </div>

            <div class="toggle-group">
                <div class="toggle-text">
                    <p>Push Notifications</p>
                    <span>Receive alerts about account activity.</span>
                </div>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <div class="toggle-group">
                <div class="toggle-text">
                    <p>Dark Mode</p>
                    <span>Switch the interface to dark theme.</span>
                </div>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-secondary">Cancel</button>
            <button class="btn btn-primary">Save Changes</button>
        </div>
    </div>

</body>
</html>
